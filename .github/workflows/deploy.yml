name: Deploy to Azure Blob Storage

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload to Azure $web
        env:
          AZURE_CONN: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
        run: |
          pip install azure-storage-blob --quiet
          python3 << 'PYEOF'
          import os, mimetypes
          from azure.storage.blob import BlobServiceClient, ContentSettings

          conn   = os.environ["AZURE_CONN"]
          client = BlobServiceClient.from_connection_string(conn)
          container = client.get_container_client("$web")

          site_dir = "."
          uploaded = errors = 0

          for root, dirs, files in os.walk(site_dir):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for fname in files:
                  local_path = os.path.join(root, fname)
                  blob_name  = os.path.relpath(local_path, site_dir).replace("\\", "/")

                  mime, _ = mimetypes.guess_type(local_path)
                  if not mime:
                      mime = "application/octet-stream"
                  if fname.endswith(".html"):
                      mime = "text/html; charset=utf-8"

                  try:
                      with open(local_path, "rb") as f:
                          container.upload_blob(
                              name=blob_name, data=f, overwrite=True,
                              content_settings=ContentSettings(content_type=mime)
                          )
                      print(f"OK  {blob_name}")
                      uploaded += 1
                  except Exception as e:
                      print(f"ERR {blob_name}: {e}")
                      errors += 1

          print(f"\nUploaded: {uploaded} | Errors: {errors}")
          if errors:
              exit(1)
          PYEOF
