<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="InIn — Innovation Infinity. The future is being printed.">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta property="og:title" content="InIn — Innovation Infinity">
    <meta property="og:description" content="The future is being printed.">
    <meta property="og:image" content="img/logo-color.png">
    <title>InIn — Innovation Infinity</title>
    <link rel="icon" type="image/png" href="img/logo-color.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html {
            height: 100%;
            height: -webkit-fill-available;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;
            min-height: -webkit-fill-available;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            padding: 1rem;
        }

        .flag {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(1rem, 3vh, 2.5rem);
            animation: fadeIn 2s ease-out;
            max-width: 100%;
        }

        .logo-container {
            position: relative;
            width: min(75vw, 55vh, 500px);
            height: min(75vw, 55vh, 500px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-color {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 40px rgba(200, 50, 50, 0.3))
                    drop-shadow(0 0 80px rgba(0, 180, 220, 0.2));
            animation: pulse 4s ease-in-out infinite;
        }

        .title {
            font-size: clamp(1rem, 3.5vw, 2.5rem);
            font-weight: 300;
            letter-spacing: clamp(0.2em, 1.5vw, 0.5em);
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            animation: fadeIn 3s ease-out;
            white-space: nowrap;
        }

        .subtitle {
            font-size: clamp(0.6rem, 1.8vw, 1rem);
            font-weight: 300;
            letter-spacing: clamp(0.05em, 0.5vw, 0.15em);
            color: rgba(255, 255, 255, 0.25);
            margin-top: clamp(-0.8rem, -1vh, -0.3rem);
            text-align: center;
            white-space: nowrap;
            position: relative;
            height: 1.5em;
        }

        .subtitle span {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            animation: cycleFade 12s ease-in-out infinite;
            white-space: nowrap;
        }

        .subtitle span:nth-child(2) {
            animation-delay: 6s;
            opacity: 0;
        }

        .line {
            width: min(70vw, 50vh, 400px);
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200, 50, 50, 0.5), rgba(0, 180, 220, 0.5), transparent);
            animation: fadeIn 3s ease-out;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background:
                radial-gradient(circle at 30% 40%, rgba(200, 50, 50, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(0, 180, 220, 0.05) 0%, transparent 50%);
        }

        /* Landscape phones */
        @media (max-height: 500px) and (orientation: landscape) {
            .logo-container {
                width: min(40vw, 70vh, 300px);
                height: min(40vw, 70vh, 300px);
            }
            .flag { gap: 0.5rem; }
            .title { font-size: clamp(0.8rem, 2.5vw, 1.5rem); }
            .subtitle { font-size: clamp(0.5rem, 1.5vw, 0.8rem); margin-top: 0; }
        }

        /* Small phones (SE, mini) */
        @media (max-width: 375px) {
            .logo-container {
                width: min(70vw, 45vh, 280px);
                height: min(70vw, 45vh, 280px);
            }
        }

        /* Tablets */
        @media (min-width: 768px) and (max-width: 1024px) {
            .logo-container {
                width: min(55vw, 50vh, 450px);
                height: min(55vw, 50vh, 450px);
            }
        }

        /* Large screens / 4K */
        @media (min-width: 1920px) {
            .logo-container {
                width: min(35vw, 55vh, 700px);
                height: min(35vw, 55vh, 700px);
            }
            .title { font-size: 3rem; }
            .subtitle { font-size: 1.2rem; }
            .line { width: 500px; }
        }

        @keyframes pulse {
            0%, 100% { filter: drop-shadow(0 0 40px rgba(200, 50, 50, 0.3)) drop-shadow(0 0 80px rgba(0, 180, 220, 0.2)); }
            50% { filter: drop-shadow(0 0 60px rgba(200, 50, 50, 0.5)) drop-shadow(0 0 100px rgba(0, 180, 220, 0.35)); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cycleFade {
            0%, 4% { opacity: 0; }
            8%, 42% { opacity: 1; }
            50%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="flag">
        <div class="logo-container">
            <img src="img/logo-color.png" alt="InIn — Innovation Infinity" class="logo-color">
        </div>
        <div class="line"></div>
        <div class="title">Innovation Infinity</div>
        <div class="subtitle">
            <span>Ніщо не зупинить ідею, час якої настав</span>
            <span>Все одно з якої точки простору-часу почати змінювати цей світ</span>
        </div>
    </div>
</body>
</html>
